networks:
  hide-network:
    name: hide-server_hide-network
    external: true

name: hide-env
services:
  node:
    container_name: node
    image: hide-env-node-dev
    build:
      context: .
      target: development
    volumes:
      - ../../filesystem:/app/filesystem
      - /app/filesystem/node_modules
    environment:
      - NODE_ENV=development
      - SERVICE_PORT=80
      - RMQ_URL=amqp://rabbitmq:5672
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - hide-network
