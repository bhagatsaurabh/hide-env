name: Build

on:
  workflow_dispatch:
    inputs:
      images:
        description: "Comma-separated list of images to build (base, deno, empty, go, nest, node, php, python, rust). Leave blank to use paths-filter."
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "envs/**"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            deno:
              - "envs/deno/**"
            empty:
              - "envs/empty/**"
            go:
              - "envs/go/**"
            nest:
              - "envs/nest/**"
            node:
              - "envs/node/**"
            php:
              - "envs/php/**"
            python:
              - "envs/python/**"
            rust:
              - "envs/rust/**"
            base:
              - "filesystem/**"
              - "dockerfile"
              - "entrypoint.sh"
              - "motd"
              - "supervisord.conf"
              - "!envs/deno/**"
              - "!envs/empty/**"
              - "!envs/go/**"
              - "!envs/nest/**"
              - "!envs/node/**"
              - "!envs/php/**"
              - "!envs/python/**"
              - "!envs/rust/**"
          predicate-quantifier: "every"

  prepare:
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set-matrix.outputs.images }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            input="${{ github.event.inputs.images }}"
            json=$(jq -nc --arg input "$input" '$input | split(",")')
            echo "images=$json" >> $GITHUB_OUTPUT
          else
            echo 'images=${{ needs.changes.outputs.matrix }}' >> $GITHUB_OUTPUT
          fi

  build-base:
    needs: [changes, prepare]
    # runs-on: ubuntu-24.04-arm # not for private repos 😭
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        if: contains(fromJson(needs.prepare.outputs.images), 'base')

      - name: Azure Service Principal Login
        if: contains(fromJson(needs.prepare.outputs.images), 'base')
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        if: contains(fromJson(needs.prepare.outputs.images), 'base')
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        if: contains(fromJson(needs.prepare.outputs.images), 'base')
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Image
        if: contains(fromJson(needs.prepare.outputs.images), 'base')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dockerfile
          target: production
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/hide-env-base:latest

  build:
    needs: [changes, prepare, build-base]
    # runs-on: ubuntu-24.04-arm # not for private repos 😭
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        image: ${{ fromJSON(needs.prepare.outputs.images) }}
        exclude:
          - image: base
    steps:
      - uses: actions/checkout@v4

      - name: Azure Service Principal Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./envs/${{ matrix.image }}
          file: envs/${{ matrix.image }}/dockerfile
          target: production
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/hide-env-${{ matrix.image }}:latest
