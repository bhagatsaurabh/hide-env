name: Build

on:
  workflow_dispatch:
    inputs:
      images:
        description: "Comma-separated list of images to build (base, deno, empty, go, nestjs, nodejs, php, python, rust). Leave blank to use paths-filter."
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "envs/**"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deno:
              - "envs/deno/**"
            empty:
              - "envs/empty/**"
            go:
              - "envs/go/**"
            nestjs:
              - "envs/nestjs/**"
            nodejs:
              - "envs/nodejs/**"
            php:
              - "envs/php/**"
            python:
              - "envs/python/**"
            rust:
              - "envs/rust/**"
            base:
              - "envs/**"
              - "!envs/deno/**"
              - "!envs/empty/**"
              - "!envs/go/**"
              - "!envs/nestjs/**"
              - "!envs/nodejs/**"
              - "!envs/php/**"
              - "!envs/python/**"
              - "!envs/rust/**"

  prepare:
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set-matrix.outputs.images }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            input="${{ github.event.inputs.images }}"
            json=$(jq -nc --arg input "$input" '$input | split(",")')
            echo "images=$json" >> $GITHUB_OUTPUT
          else
            echo 'images=${{ needs.changes.outputs.matrix }}' >> $GITHUB_OUTPUT
          fi

  build-base:
    needs: [changes, prepare]
    # runs-on: ubuntu-24.04-arm # not for private repos 😭
    runs-on: arm64
    if: contains(fromJSON(needs.prepare.outputs.images), 'base')
    steps:
      - uses: actions/checkout@v4

      - name: Azure Service Principal Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dockerfile
          target: production
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/hide-server-${{ matrix.image }}:latest

  build:
    needs: [changes, prepare, build-base]
    # runs-on: ubuntu-24.04-arm # not for private repos 😭
    if: needs.changes.result == 'success' && needs.prepare.result == 'success' && (needs.build-base.result == 'success' || needs.build-base.result == 'skipped')
    runs-on: arm64
    strategy:
      matrix:
        image: ${{ fromJSON(needs.prepare.outputs.images) }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Service Principal Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./envs/${{ matrix.image }}
          file: dockerfile
          target: production
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/hide-env-${{ matrix.image }}:latest
